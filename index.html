<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Galería Pro</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #111;
      color: white;
    }

    .gallery img {
      transition: 0.3s;
      cursor: pointer;
    }

    .gallery img:hover {
      transform: scale(1.05);
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="container py-5">

  <h1 class="text-center mb-5">📸 Mi Galería</h1>

  <div class="row g-4 gallery">

    <!-- Imagen -->
    <div class="col-12 col-sm-6 col-md-4 col-lg-3">
      <img src="https://source.unsplash.com/random/1" class="img-fluid rounded shadow">
    </div>

    <div class="col-12 col-sm-6 col-md-4 col-lg-3">
      <img src="https://source.unsplash.com/random/2" class="img-fluid rounded shadow">
    </div>

    <div class="col-12 col-sm-6 col-md-4 col-lg-3">
      <img src="https://source.unsplash.com/random/3" class="img-fluid rounded shadow">
    </div>

    <div class="col-12 col-sm-6 col-md-4 col-lg-3">
      <img src="https://source.unsplash.com/random/4" class="img-fluid rounded shadow">
    </div>

    <div class="col-12 col-sm-6 col-md-4 col-lg-3">
      <img src="https://source.unsplash.com/random/5" class="img-fluid rounded shadow">
    </div>

    <div class="col-12 col-sm-6 col-md-4 col-lg-3">
      <img src="https://source.unsplash.com/random/6" class="img-fluid rounded shadow">
    </div>

  </div>

</div>

</body>
</html>
