<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Galería de imágenes moderna, responsive y altamente interactiva">
    <title>Draconky</title>
    <link rel="icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="./index.css" rel="stylesheet">
</head>

<body>

    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="gallery-title mb-3">
                📸 Mini Galeria de Imagenes
            </h1>
            <p class="text-muted fs-5">Versión Beta de la galeria de imagenes.</p>

            <div class="d-flex justify-content-center gap-3 mt-4">
                <button id="btn-grid" class="btn btn-outline-light active" title="Vista en cuadrícula">
                    <i class="fas fa-th-large"></i>
                </button>
                <button id="btn-masonry" class="btn btn-outline-light" title="Vista masonry" hidden>
                    <i class="fas fa-grip-vertical"></i>
                </button>
            </div>
        </div>

        <div id="gallery" class="row g-4 gallery-grid"></div>
    </div>

    <div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content bg-dark border-0 rounded-4 shadow-lg overflow-hidden">
                <div class="modal-header border-0 px-4 py-3">
                    <h5 class="modal-title text-white fw-semibold" id="modalTitle"></h5>
                    <div class="d-flex gap-2">
                        <button id="btn-download" class="btn btn-outline-light btn-sm" title="Descargar imagen">
                            <i class="fas fa-download"></i>
                        </button>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                            aria-label="Cerrar"></button>
                    </div>
                </div>
                <div class="modal-body p-0 text-center bg-black position-relative">
                    <img id="modalImage" src="" alt="Imagen ampliada" class="img-fluid w-100"
                        style="max-height: 88vh; object-fit: contain;">

                    <button id="prevBtn" class="nav-btn position-absolute start-0 top-50 translate-middle-y">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <button id="nextBtn" class="nav-btn position-absolute end-0 top-50 translate-middle-y">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
                <div class="modal-footer border-0 py-3">
                    <div id="modalCounter" class="text-white-50 small"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./index.js"></script>

</body>

</html>
