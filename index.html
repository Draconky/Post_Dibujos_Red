<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Galería de imágenes moderna, responsive y altamente interactiva">
    <title>Draconky</title>

    <link rel="icon" href="/favicon.ico">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="./index.css" rel="stylesheet">
</head>

<body id="top">

    <!-- Contador pequeño fijo -->
    <div class="position-fixed top-0 end-0 m-2 z-3 small opacity-75">
        <div id="sfcs4ru6n7mbrm438htajsu1w3smngu89e8"></div>
    </div>

    <script type="text/javascript"
        src="https://counter1.optistats.ovh/private/counter.js?c=s4ru6n7mbrm438htajsu1w3smngu89e8&down=async"
        async></script>

    <noscript>
        <a href="https://www.contadorvisitasgratis.com" title="contador de visitas">
            <img src="https://counter1.optistats.ovh/private/contadorvisitasgratis.php?c=s4ru6n7mbrm438htajsu1w3smngu89e8"
                border="0"
                title="contador de visitas"
                alt="contador de visitas"
                width="70">
        </a>
    </noscript>

    <!-- Barra superior -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top border-bottom border-secondary">
        <div class="container">

            <a class="navbar-brand fw-bold" href="#top">
                📸 Draconky
            </a>

            <!-- Hamburguesa -->
            <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menuTop"
                aria-controls="menuTop"
                aria-expanded="false"
                aria-label="Menú navegación">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuTop">
                <div class="ms-auto d-flex flex-column flex-lg-row gap-2 mt-3 mt-lg-0">

                    <!-- Se conservan IDs -->
                    <button id="btn-grid"
                        class="btn btn-outline-light active"
                        title="Vista en cuadrícula">
                        <i class="fas fa-th-large me-1"></i>
                        Cuadrícula
                    </button>

                    <button id="btn-masonry"
                        class="btn btn-outline-light"
                        title="Vista masonry"
                        hidden>
                        <i class="fas fa-grip-vertical me-1"></i>
                        Masonry
                    </button>

                </div>
            </div>

        </div>
    </nav>

    <!-- Contenido -->
    <div class="container py-5">

        <div class="text-center mb-5">

            <h1 class="gallery-title mb-3">
                📸 Mini Galeria de Imagenes
            </h1>

            <p class="text-muted fs-5">
                Versión Beta de la galeria de imagenes.
            </p>

        </div>

        <!-- Se conserva ID -->
        <div id="gallery" class="row g-4 gallery-grid"></div>

    </div>

    <!-- Botón subir -->
    <a href="#top"
        class="btn btn-primary rounded-circle shadow position-fixed bottom-0 end-0 m-4 z-3"
        title="Subir al inicio">
        <i class="fas fa-arrow-up"></i>
    </a>

    <!-- Modal sin cambiar IDs -->
    <div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">

        <div class="modal-dialog modal-xl modal-dialog-centered">

            <div class="modal-content bg-dark border-0 rounded-4 shadow-lg overflow-hidden">

                <div class="modal-header border-0 px-4 py-3">

                    <div>
                        <h5 class="modal-title text-white fw-semibold mb-1" id="modalTitle"></h5>
                        <div id="modalCounter" class="text-white-50 small"></div>
                    </div>

                    <div class="d-flex gap-2">

                        <button id="btn-download"
                            class="btn btn-outline-light btn-sm"
                            title="Descargar imagen">
                            <i class="fas fa-download"></i>
                        </button>

                        <button type="button"
                            class="btn-close btn-close-white"
                            data-bs-dismiss="modal"
                            aria-label="Cerrar"></button>

                    </div>

                </div>

                <div class="modal-body p-0 text-center bg-black position-relative">

                    <img id="modalImage"
                        src=""
                        alt="Imagen ampliada"
                        class="img-fluid w-100"
                        style="max-height:88vh; object-fit:contain;">

                    <button id="prevBtn"
                        class="nav-btn position-absolute start-0 top-50 translate-middle-y btn btn-dark rounded-circle ms-2">
                        <i class="fas fa-chevron-left"></i>
                    </button>

                    <button id="nextBtn"
                        class="nav-btn position-absolute end-0 top-50 translate-middle-y btn btn-dark rounded-circle me-2">
                        <i class="fas fa-chevron-right"></i>
                    </button>

                </div>

                <div class="modal-footer border-0 py-2 justify-content-center">
                    <small class="text-white-50">
                        Usa flechas del teclado o botones para navegar
                    </small>
                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./index.js"></script>

</body>

</html>
