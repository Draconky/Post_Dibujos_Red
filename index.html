<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería Pro</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #0a0a0a;
      color: #eee;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .gallery-title {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #ff00cc, #00ffcc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .gallery-card {
      overflow: hidden;
      border: none;
      border-radius: 16px;
      background: #1a1a1a;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .gallery-card:hover {
      transform: translateY(-12px) scale(1.03);
      box-shadow: 0 20px 40px rgba(0, 255, 200, 0.15);
    }

    .gallery-img {
      height: 280px;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .gallery-card:hover .gallery-img {
      transform: scale(1.15);
    }

    .card-body {
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(10px);
    }

    .img-title {
      font-size: 1.05rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gallery-card {
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 0.7s forwards;
    }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="container py-5">
  <h1 class="gallery-title text-center mb-5">📸 Mi Galería Profesional</h1>

  <div id="gallery" class="row g-4">
    <!-- Las imágenes se cargan aquí -->
  </div>
</div>

<!-- Modal para ver imagen en grande -->
<div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content bg-dark border-0">
      <div class="modal-header border-0">
        <h5 class="modal-title text-white" id="modalTitle"></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-0 text-center">
        <img id="modalImage" src="" alt="" class="img-fluid" style="max-height: 85vh;">
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ==================== LISTA DE IMÁGENES ====================
// Actualiza esta lista cada vez que agregues o elimines imágenes en la carpeta "imagenes/"
const imagenes = [
  "Meili con casco.png",
  "Mini If Anastasia y Ben.png",
  "XLR8 con Betty.png"
  // Agrega aquí nuevas imágenes manteniendo el formato exacto:
  // "Nombre exacto de la imagen.png",
];

const carpeta = "imagenes/";

function cargarGaleria() {
  const galleryContainer = document.getElementById('gallery');
  galleryContainer.innerHTML = '';

  if (imagenes.length === 0) {
    galleryContainer.innerHTML = `
      <div class="col-12 text-center py-5">
        <p class="text-muted fs-5">No hay imágenes para mostrar.</p>
      </div>`;
    return;
  }

  imagenes.forEach((nombreArchivo, index) => {
    // Crear título legible desde el nombre del archivo
    const titulo = nombreArchivo
      .replace(/\.[^/.]+$/, "")           // Quitar extensión
      .replace(/-/g, " ")
      .replace(/_/g, " ")
      .replace(/\b\w/g, l => l.toUpperCase());

    const col = document.createElement('div');
    col.className = `col-12 col-sm-6 col-md-4 col-lg-3`;
    col.style.animationDelay = `${index * 80}ms`;

    col.innerHTML = `
      <div class="gallery-card h-100 shadow-sm">
        <img src="${carpeta}${nombreArchivo}" 
             class="gallery-img img-fluid w-100 rounded-top" 
             alt="${titulo}"
             onerror="this.src='https://via.placeholder.com/400x280/1a1a1a/666?text=Imagen+no+encontrada';">
        <div class="card-body p-3 text-center">
          <h6 class="img-title mb-0">${titulo}</h6>
        </div>
      </div>
    `;

    // Evento para abrir la imagen en modal
    col.querySelector('img').addEventListener('click', () => {
      document.getElementById('modalImage').src = `${carpeta}${nombreArchivo}`;
      document.getElementById('modalTitle').textContent = titulo;
      new bootstrap.Modal(document.getElementById('imageModal')).show();
    });

    galleryContainer.appendChild(col);
  });
}

// Cargar la galería cuando se abra la página
document.addEventListener('DOMContentLoaded', cargarGaleria);
</script>

</body>
</html>
