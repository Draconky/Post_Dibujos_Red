<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Galería de imágenes moderna y responsive">

    <title>Galería</title>

    <!-- Favicon -->
    <link rel="icon" href="./favicon.ico" type="image/x-icon">

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos propios -->
    <link href="./index.css" rel="stylesheet">
</head>

<body>

    <div class="container py-5">
        <h1 class="gallery-title text-center mb-5">
            📸 Repositorio de imágenes
        </h1>

        <div id="gallery" class="row g-4">
            <!-- Las imágenes se insertan dinámicamente -->
        </div>
    </div>

    <div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">

            <div class="modal-content bg-dark border-0 rounded-4 shadow">

                <div class="modal-header border-0">
                    <h5 class="modal-title text-white" id="modalTitle">
                        Vista previa
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Cerrar"></button>
                </div>

                <div class="modal-body p-0 text-center">
                    <img id="modalImage" src="" alt="Imagen ampliada" class="img-fluid rounded-bottom"
                        style="max-height: 85vh;">
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./index.js"></script>

</body>

</html>
